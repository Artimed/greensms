name: zelenaya_sms
description: "Zelenaya SMS MVP"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  get_it: ^8.2.0
  sqflite: ^2.4.2
  path: ^1.9.1
  intl: ^0.20.2
  crypto: ^3.0.6
  image_picker: ^1.2.0
  permission_handler: ^12.0.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.3
  url_launcher: ^6.3.2
  flutter_secure_storage: ^9.2.4
  uuid: ^4.5.1
  http: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/design/
    - assets/icons/
    - assets/data/
